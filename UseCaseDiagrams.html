<!DOCTYPE html>

<head>

    <title>IntelliScan Use Case Diagrams</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        h1, h2 { color: black; }
        svg { border: 1px solid black; margin: 20px 0; }
        .diagram { margin-bottom: 40px; }

<body>
    <h1>IntelliScan Use Case Diagrams</h1>
    <p>These are simple HTML-rendered use case diagrams based on user roles. No colors, no Mermaid code.</p>

        <h2>1. Anonymous Visitor Workflow</h2>
        <svg width="600" height="300">
            <!-- Actor: Anonymous Visitor -->
            <g transform="translate(50, 150)">
                <circle cx="0" cy="-30" r="10" fill="none" stroke="black"/>

                <line x1="-15" y1="-10" x2="15" y2="-10" stroke="black"/>
                <line x1="0" y1="0" x2="-10" y2="20" stroke="black"/>
                <line x1="0" y1="0" x2="10" y2="20" stroke="black"/>
                <text x="0" y="40" text-anchor="middle" font-size="12">Anonymous Visitor</text>
            </g>
            <!-- Use Cases -->
            <ellipse cx="300" cy="50" rx="80" ry="30" fill="none" stroke="black"/>
            <text x="300" y="55" text-anchor="middle" font-size="12">View Public Pages</text>
            <ellipse cx="300" cy="120" rx="80" ry="30" fill="none" stroke="black"/>
            <text x="300" y="125" text-anchor="middle" font-size="12">Initiate Authentication</text>
            <ellipse cx="300" cy="190" rx="80" ry="30" fill="none" stroke="black"/>
            <text x="300" y="195" text-anchor="middle" font-size="12">Access Calendar Links</text>
            <ellipse cx="300" cy="260" rx="80" ry="30" fill="none" stroke="black"/>
            <text x="300" y="265" text-anchor="middle" font-size="12">Perform Event Kiosk Scan</text>
            <!-- Lines -->
            <line x1="80" y1="150" x2="220" y2="50" stroke="black"/>
            <line x1="80" y1="150" x2="220" y2="120" stroke="black"/>
            <line x1="80" y1="150" x2="220" y2="190" stroke="black"/>
            <line x1="80" y1="150" x2="220" y2="260" stroke="black"/>
        </svg>
    </div>
