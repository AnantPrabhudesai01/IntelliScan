<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820">
<defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#000"/>
      </marker>
    </defs>
<style>
      .shape { fill: #fff; stroke: #000; stroke-width: 2; }
      .thin { stroke-width: 1.5; }
      .fillBlack { fill: #000; stroke: #000; stroke-width: 2; }
      .text { fill: #000; font-family: Arial, Helvetica, sans-serif; font-size: 14px; }
      .textSmall { font-size: 12px; }
      .textTitle { font-size: 16px; font-weight: 700; }
      .dashed { stroke-dasharray: 6 6; }
    </style>
<rect x="0" y="0" width="1200" height="820" fill="#fff" />
<text class="text textTitle" x="600" y="40" text-anchor="middle">Activity Diagram: Billing Upgrade (Razorpay) -&gt; Tier/Quota Refresh</text>
<circle class="fillBlack" cx="600" cy="90" r="10" />
<rect class="shape" x="200" y="120" width="800" height="74" rx="12" ry="12" />
<text class="text" x="600" y="153" text-anchor="middle"><tspan x="600" dy="0">User selects plan (Pro / Enterprise)</tspan></text>
<line class="shape thin" x1="600" y1="110" x2="600" y2="120" />
<rect class="shape" x="200" y="224" width="800" height="74" rx="12" ry="12" />
<text class="text" x="600" y="257" text-anchor="middle"><tspan x="600" dy="0">POST /api/billing/create-order</tspan><tspan x="600" dy="14">(server creates Razorpay order</tspan><tspan x="600" dy="14">or simulated order in demo mode)</tspan></text>
<line class="shape thin" x1="600" y1="214" x2="600" y2="224" />
<rect class="shape" x="200" y="328" width="800" height="74" rx="12" ry="12" />
<text class="text" x="600" y="361" text-anchor="middle"><tspan x="600" dy="0">Razorpay Checkout</tspan><tspan x="600" dy="14">(user completes payment)</tspan></text>
<line class="shape thin" x1="600" y1="318" x2="600" y2="328" />
<rect class="shape" x="200" y="432" width="800" height="74" rx="12" ry="12" />
<text class="text" x="600" y="465" text-anchor="middle"><tspan x="600" dy="0">POST /api/billing/verify-payment</tspan><tspan x="600" dy="14">(verify signature)</tspan></text>
<line class="shape thin" x1="600" y1="422" x2="600" y2="432" />
<rect class="shape" x="200" y="536" width="800" height="74" rx="12" ry="12" />
<text class="text" x="600" y="569" text-anchor="middle"><tspan x="600" dy="0">Update users.tier + user_quotas</tspan><tspan x="600" dy="14">+ billing_orders + invoices</tspan></text>
<line class="shape thin" x1="600" y1="526" x2="600" y2="536" />
<rect class="shape" x="200" y="640" width="800" height="74" rx="12" ry="12" />
<text class="text" x="600" y="673" text-anchor="middle"><tspan x="600" dy="0">Return updated entitlements</tspan><tspan x="600" dy="14">(frontend refresh)</tspan></text>
<line class="shape thin" x1="600" y1="630" x2="600" y2="640" />
<rect class="shape" x="200" y="744" width="800" height="74" rx="12" ry="12" />
<text class="text" x="600" y="777" text-anchor="middle"><tspan x="600" dy="0">Billing page shows invoice history</tspan><tspan x="600" dy="14">+ plan status</tspan></text>
<line class="shape thin" x1="600" y1="734" x2="600" y2="744" />
<circle class="shape" cx="600" cy="858" r="14" />
<circle class="fillBlack" cx="600" cy="858" r="8" />
<line class="shape thin" x1="600" y1="838" x2="600" y2="846" />
<rect class="shape thin" x="60" y="620" width="320" height="160" rx="6" ry="6" />
<text class="text textSmall" x="70" y="638" text-anchor="start"><tspan x="70" dy="0">Demo mode:</tspan><tspan x="70" dy="14">- if Razorpay keys missing,</tspan><tspan x="70" dy="14">  server returns simulated order</tspan><tspan x="70" dy="14">  so UI is still functional.</tspan><tspan x="70" dy="14">Security:</tspan><tspan x="70" dy="14">- never trust client amount</tspan><tspan x="70" dy="14">- verify signature server-side</tspan></text>
</svg>