<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="860" viewBox="0 0 1200 860">
<defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#000"/>
      </marker>
    </defs>
<style>
      .shape { fill: #fff; stroke: #000; stroke-width: 2; }
      .thin { stroke-width: 1.5; }
      .fillBlack { fill: #000; stroke: #000; stroke-width: 2; }
      .text { fill: #000; font-family: Arial, Helvetica, sans-serif; font-size: 14px; }
      .textSmall { font-size: 12px; }
      .textTitle { font-size: 16px; font-weight: 700; }
      .dashed { stroke-dasharray: 6 6; }
    </style>
<rect x="0" y="0" width="1200" height="860" fill="#fff" />
<text class="text textTitle" x="600" y="40" text-anchor="middle">Activity Diagram: Email Campaign (Audience -&gt; AI Copy -&gt; Send -&gt; Track)</text>
<circle class="fillBlack" cx="600" cy="90" r="10" />
<rect class="shape" x="220" y="120" width="760" height="70" rx="12" ry="12" />
<text class="text" x="600" y="151" text-anchor="middle"><tspan x="600" dy="0">Select audience</tspan><tspan x="600" dy="14">(email list / segment / event)</tspan></text>
<line class="shape thin" x1="600" y1="110" x2="600" y2="120" />
<rect class="shape" x="220" y="216" width="760" height="70" rx="12" ry="12" />
<text class="text" x="600" y="247" text-anchor="middle"><tspan x="600" dy="0">Optional: AI generates subject + body</tspan><tspan x="600" dy="14">(Gemini copywriter)</tspan></text>
<line class="shape thin" x1="600" y1="206" x2="600" y2="216" />
<rect class="shape" x="220" y="312" width="760" height="70" rx="12" ry="12" />
<text class="text" x="600" y="343" text-anchor="middle"><tspan x="600" dy="0">Preview recipient count</tspan><tspan x="600" dy="14">+ compliance checks</tspan></text>
<line class="shape thin" x1="600" y1="302" x2="600" y2="312" />
<rect class="shape" x="220" y="408" width="760" height="70" rx="12" ry="12" />
<text class="text" x="600" y="439" text-anchor="middle"><tspan x="600" dy="0">POST /api/email/campaigns</tspan><tspan x="600" dy="14">(create campaign draft)</tspan></text>
<line class="shape thin" x1="600" y1="398" x2="600" y2="408" />
<rect class="shape" x="220" y="504" width="760" height="70" rx="12" ry="12" />
<text class="text" x="600" y="535" text-anchor="middle"><tspan x="600" dy="0">POST /api/email/campaigns/:id/send</tspan><tspan x="600" dy="14">(queue sends)</tspan></text>
<line class="shape thin" x1="600" y1="494" x2="600" y2="504" />
<rect class="shape" x="220" y="600" width="760" height="70" rx="12" ry="12" />
<text class="text" x="600" y="631" text-anchor="middle"><tspan x="600" dy="0">Send emails via SMTP</tspan><tspan x="600" dy="14">(email_sends rows created)</tspan></text>
<line class="shape thin" x1="600" y1="590" x2="600" y2="600" />
<rect class="shape" x="220" y="696" width="760" height="70" rx="12" ry="12" />
<text class="text" x="600" y="727" text-anchor="middle"><tspan x="600" dy="0">Track opens/clicks</tspan><tspan x="600" dy="14">(email_clicks + events)</tspan></text>
<line class="shape thin" x1="600" y1="686" x2="600" y2="696" />
<rect class="shape" x="220" y="792" width="760" height="70" rx="12" ry="12" />
<text class="text" x="600" y="823" text-anchor="middle"><tspan x="600" dy="0">Update analytics dashboard</tspan><tspan x="600" dy="14">(open rate, CTR, conversions)</tspan></text>
<line class="shape thin" x1="600" y1="782" x2="600" y2="792" />
<circle class="shape" cx="600" cy="898" r="14" />
<circle class="fillBlack" cx="600" cy="898" r="8" />
<line class="shape thin" x1="600" y1="878" x2="600" y2="886" />
<rect class="shape thin" x="60" y="640" width="320" height="150" rx="6" ry="6" />
<text class="text textSmall" x="70" y="658" text-anchor="start"><tspan x="70" dy="0">Production notes:</tspan><tspan x="70" dy="14">- unsubscribe support</tspan><tspan x="70" dy="14">- per-workspace sending limits</tspan><tspan x="70" dy="14">- bounce handling</tspan><tspan x="70" dy="14">- audit trail for sends</tspan><tspan x="70" dy="14">- store template versions</tspan></text>
</svg>