<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="700" viewBox="0 0 1400 700">
<defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#000"/>
      </marker>
    </defs>
<style>
      .shape { fill: #fff; stroke: #000; stroke-width: 2; }
      .thin { stroke-width: 1.5; }
      .fillBlack { fill: #000; stroke: #000; stroke-width: 2; }
      .text { fill: #000; font-family: Arial, Helvetica, sans-serif; font-size: 14px; }
      .textSmall { font-size: 12px; }
      .textTitle { font-size: 16px; font-weight: 700; }
      .dashed { stroke-dasharray: 6 6; }
    </style>
<rect x="0" y="0" width="1400" height="700" fill="#fff" />
<text class="text textTitle" x="700" y="40" text-anchor="middle">Interaction Diagram: Group Scan -&gt; Save All</text>
<rect class="shape" x="70" y="80" width="160" height="38" rx="4" ry="4" />
<text class="text textSmall" x="150" y="104" text-anchor="middle"><tspan x="150" dy="0">User</tspan></text>
<rect class="shape" x="260" y="80" width="220" height="38" rx="4" ry="4" />
<text class="text textSmall" x="370" y="104" text-anchor="middle"><tspan x="370" dy="0">Group Scan UI</tspan></text>
<rect class="shape" x="530" y="80" width="170" height="38" rx="4" ry="4" />
<text class="text textSmall" x="615" y="104" text-anchor="middle"><tspan x="615" dy="0">Scan API</tspan></text>
<rect class="shape" x="740" y="80" width="170" height="38" rx="4" ry="4" />
<text class="text textSmall" x="825" y="104" text-anchor="middle"><tspan x="825" dy="0">Gemini AI</tspan></text>
<rect class="shape" x="950" y="80" width="230" height="38" rx="4" ry="4" />
<text class="text textSmall" x="1065" y="104" text-anchor="middle"><tspan x="1065" dy="0">Contacts Bulk API</tspan></text>
<rect class="shape" x="1220" y="80" width="170" height="38" rx="4" ry="4" />
<text class="text textSmall" x="1305" y="104" text-anchor="middle"><tspan x="1305" dy="0">DB / Dedupe Queue</tspan></text>
<line class="shape thin dashed" x1="150" y1="118" x2="150" y2="640" />
<line class="shape thin dashed" x1="370" y1="118" x2="370" y2="640" />
<line class="shape thin dashed" x1="615" y1="118" x2="615" y2="640" />
<line class="shape thin dashed" x1="825" y1="118" x2="825" y2="640" />
<line class="shape thin dashed" x1="1065" y1="118" x2="1065" y2="640" />
<line class="shape thin dashed" x1="1305" y1="118" x2="1305" y2="640" />
<line class="shape thin" x1="150" y1="150" x2="370" y2="150" marker-end="url(#arrow)" />
<text class="text textSmall" x="260" y="142" text-anchor="middle">Upload group photo</text>
<line class="shape thin" x1="370" y1="205" x2="615" y2="205" marker-end="url(#arrow)" />
<text class="text textSmall" x="492.5" y="197" text-anchor="middle">POST /api/scan-multi</text>
<line class="shape thin" x1="615" y1="260" x2="825" y2="260" marker-end="url(#arrow)" />
<text class="text textSmall" x="720" y="252" text-anchor="middle">Extract contact[]</text>
<line class="shape thin" x1="825" y1="315" x2="615" y2="315" marker-end="url(#arrow)" />
<text class="text textSmall" x="720" y="307" text-anchor="middle">JSON contact[]</text>
<line class="shape thin" x1="615" y1="370" x2="370" y2="370" marker-end="url(#arrow)" />
<text class="text textSmall" x="492.5" y="362" text-anchor="middle">200 results</text>
<line class="shape thin" x1="150" y1="425" x2="370" y2="425" marker-end="url(#arrow)" />
<text class="text textSmall" x="260" y="417" text-anchor="middle">Save All New</text>
<line class="shape thin" x1="370" y1="480" x2="1065" y2="480" marker-end="url(#arrow)" />
<text class="text textSmall" x="717.5" y="472" text-anchor="middle">POST /api/contacts/bulk</text>
<line class="shape thin" x1="1065" y1="535" x2="1305" y2="535" marker-end="url(#arrow)" />
<text class="text textSmall" x="1185" y="527" text-anchor="middle">INSERT contacts + enqueue dedupe</text>
<line class="shape thin" x1="1305" y1="590" x2="1065" y2="590" marker-end="url(#arrow)" />
<text class="text textSmall" x="1185" y="582" text-anchor="middle">OK</text>
<line class="shape thin" x1="1065" y1="645" x2="370" y2="645" marker-end="url(#arrow)" />
<text class="text textSmall" x="717.5" y="637" text-anchor="middle">201 bulk created</text>
<line class="shape thin" x1="370" y1="700" x2="150" y2="700" marker-end="url(#arrow)" />
<text class="text textSmall" x="260" y="692" text-anchor="middle">Refresh UI</text>
</svg>