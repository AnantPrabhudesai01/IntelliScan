<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="780" viewBox="0 0 1400 780">
<defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#000"/>
      </marker>
    </defs>
<style>
      .shape { fill: #fff; stroke: #000; stroke-width: 2; }
      .thin { stroke-width: 1.5; }
      .fillBlack { fill: #000; stroke: #000; stroke-width: 2; }
      .text { fill: #000; font-family: Arial, Helvetica, sans-serif; font-size: 14px; }
      .textSmall { font-size: 12px; }
      .textTitle { font-size: 16px; font-weight: 700; }
      .dashed { stroke-dasharray: 6 6; }
    </style>
<rect x="0" y="0" width="1400" height="780" fill="#fff" />
<text class="text textTitle" x="700" y="40" text-anchor="middle">Class Diagram: Authentication &amp; Access Profile</text>
<rect class="shape" x="80" y="90" width="320" height="148" rx="4" ry="4" />
<line class="shape thin" x1="80" y1="124" x2="400" y2="124" />
<line class="shape thin" x1="80" y1="198" x2="400" y2="198" />
<text class="text textSmall" x="240" y="112" text-anchor="middle">User</text>
<text class="text textSmall" x="90" y="142" text-anchor="start">+id: int</text>
<text class="text textSmall" x="90" y="158" text-anchor="start">+email: string</text>
<text class="text textSmall" x="90" y="174" text-anchor="start">+role: string</text>
<text class="text textSmall" x="90" y="190" text-anchor="start">+tier: string</text>
<text class="text textSmall" x="90" y="216" text-anchor="start">+isAdmin(): bool</text>
<rect class="shape" x="520" y="90" width="320" height="148" rx="4" ry="4" />
<line class="shape thin" x1="520" y1="124" x2="840" y2="124" />
<line class="shape thin" x1="520" y1="198" x2="840" y2="198" />
<text class="text textSmall" x="680" y="112" text-anchor="middle">Session</text>
<text class="text textSmall" x="530" y="142" text-anchor="start">+id: int</text>
<text class="text textSmall" x="530" y="158" text-anchor="start">+token: string</text>
<text class="text textSmall" x="530" y="174" text-anchor="start">+user_id: int</text>
<text class="text textSmall" x="530" y="190" text-anchor="start">+expires_at: datetime</text>
<text class="text textSmall" x="530" y="216" text-anchor="start">(none)</text>
<rect class="shape" x="960" y="90" width="340" height="164" rx="4" ry="4" />
<line class="shape thin" x1="960" y1="124" x2="1300" y2="124" />
<line class="shape thin" x1="960" y1="214" x2="1300" y2="214" />
<text class="text textSmall" x="1130" y="112" text-anchor="middle">UserQuota</text>
<text class="text textSmall" x="970" y="142" text-anchor="start">+user_id: int</text>
<text class="text textSmall" x="970" y="158" text-anchor="start">+scans_total: int</text>
<text class="text textSmall" x="970" y="174" text-anchor="start">+scans_used: int</text>
<text class="text textSmall" x="970" y="190" text-anchor="start">+group_total: int</text>
<text class="text textSmall" x="970" y="206" text-anchor="start">+group_used: int</text>
<text class="text textSmall" x="970" y="232" text-anchor="start">+canScan(): bool</text>
<rect class="shape" x="80" y="420" width="420" height="132" rx="4" ry="4" />
<line class="shape thin" x1="80" y1="454" x2="500" y2="454" />
<line class="shape thin" x1="80" y1="494" x2="500" y2="494" />
<text class="text textSmall" x="290" y="442" text-anchor="middle">AuthService</text>
<text class="text textSmall" x="90" y="472" text-anchor="start">+jwtSecret: string</text>
<text class="text textSmall" x="90" y="512" text-anchor="start">+signIn(email,pw)</text>
<text class="text textSmall" x="90" y="528" text-anchor="start">+restore(token)</text>
<text class="text textSmall" x="90" y="544" text-anchor="start">+revoke(sessionId)</text>
<rect class="shape" x="560" y="420" width="360" height="114" rx="4" ry="4" />
<line class="shape thin" x1="560" y1="454" x2="920" y2="454" />
<line class="shape thin" x1="560" y1="494" x2="920" y2="494" />
<text class="text textSmall" x="740" y="442" text-anchor="middle">RBACPolicy</text>
<text class="text textSmall" x="570" y="472" text-anchor="start">+rules: map</text>
<text class="text textSmall" x="570" y="512" text-anchor="start">+can(user, action): bool</text>
<rect class="shape" x="980" y="420" width="340" height="132" rx="4" ry="4" />
<line class="shape thin" x1="980" y1="454" x2="1320" y2="454" />
<line class="shape thin" x1="980" y1="494" x2="1320" y2="494" />
<text class="text textSmall" x="1150" y="442" text-anchor="middle">AuthAPI</text>
<text class="text textSmall" x="990" y="472" text-anchor="start">(none)</text>
<text class="text textSmall" x="990" y="512" text-anchor="start">+POST /auth/login</text>
<text class="text textSmall" x="990" y="528" text-anchor="start">+GET /auth/me</text>
<text class="text textSmall" x="990" y="544" text-anchor="start">+POST /auth/logout</text>
<line class="shape thin" x1="400" y1="150" x2="520" y2="150" marker-end="url(#arrow)" />
<text class="text textSmall" x="460" y="140" text-anchor="middle">1..n</text>
<line class="shape thin" x1="840" y1="150" x2="960" y2="150" marker-end="url(#arrow)" />
<text class="text textSmall" x="900" y="140" text-anchor="middle">1..1</text>
<line class="shape thin" x1="290" y1="420" x2="290" y2="360" marker-end="url(#arrow)" />
<line class="shape thin" x1="290" y1="360" x2="680" y2="360" marker-end="url(#arrow)" />
<line class="shape thin" x1="680" y1="360" x2="680" y2="420" marker-end="url(#arrow)" />
<text class="text textSmall" x="520" y="350" text-anchor="middle">uses</text>
<line class="shape thin" x1="1160" y1="420" x2="1160" y2="360" marker-end="url(#arrow)" />
<line class="shape thin" x1="1160" y1="360" x2="680" y2="360" marker-end="url(#arrow)" />
<text class="text textSmall" x="940" y="350" text-anchor="middle">enforces</text>
</svg>