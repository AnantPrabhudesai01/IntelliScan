<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820">
<defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#000"/>
      </marker>
    </defs>
<style>
      .shape { fill: #fff; stroke: #000; stroke-width: 2; }
      .thin { stroke-width: 1.5; }
      .fillBlack { fill: #000; stroke: #000; stroke-width: 2; }
      .text { fill: #000; font-family: Arial, Helvetica, sans-serif; font-size: 14px; }
      .textSmall { font-size: 12px; }
      .textTitle { font-size: 16px; font-weight: 700; }
      .dashed { stroke-dasharray: 6 6; }
    </style>
<rect x="0" y="0" width="1200" height="820" fill="#fff" />
<text class="text textTitle" x="600" y="40" text-anchor="middle">Activity Diagram: Single Card Scan -&gt; Save Contact</text>
<circle class="fillBlack" cx="600" cy="90" r="10" />
<rect class="shape" x="240" y="120" width="720" height="62" rx="12" ry="12" />
<text class="text" x="600" y="147" text-anchor="middle"><tspan x="600" dy="0">User selects optional Event</tspan><tspan x="600" dy="14">(for lead attribution)</tspan></text>
<line class="shape thin" x1="600" y1="110" x2="600" y2="120" />
<rect class="shape" x="240" y="208" width="720" height="62" rx="12" ry="12" />
<text class="text" x="600" y="235" text-anchor="middle"><tspan x="600" dy="0">Upload photo (single card)</tspan><tspan x="600" dy="14">(frontend validates file)</tspan></text>
<line class="shape thin" x1="600" y1="198" x2="600" y2="208" />
<rect class="shape" x="240" y="296" width="720" height="62" rx="12" ry="12" />
<text class="text" x="600" y="323" text-anchor="middle"><tspan x="600" dy="0">POST /api/scan (Gemini OCR)</tspan><tspan x="600" dy="14">+ quota check</tspan></text>
<line class="shape thin" x1="600" y1="286" x2="600" y2="296" />
<rect class="shape" x="240" y="384" width="720" height="62" rx="12" ry="12" />
<text class="text" x="600" y="411" text-anchor="middle"><tspan x="600" dy="0">Parse &amp; normalize JSON fields</tspan><tspan x="600" dy="14">(name, email, phone, company)</tspan></text>
<line class="shape thin" x1="600" y1="374" x2="600" y2="384" />
<rect class="shape" x="240" y="472" width="720" height="62" rx="12" ry="12" />
<text class="text" x="600" y="499" text-anchor="middle"><tspan x="600" dy="0">Show Extraction Preview</tspan><tspan x="600" dy="14">(user can edit fields)</tspan></text>
<line class="shape thin" x1="600" y1="462" x2="600" y2="472" />
<rect class="shape" x="240" y="560" width="720" height="62" rx="12" ry="12" />
<text class="text" x="600" y="587" text-anchor="middle"><tspan x="600" dy="0">POST /api/contacts (save contact)</tspan><tspan x="600" dy="14">+ audit trail</tspan></text>
<line class="shape thin" x1="600" y1="550" x2="600" y2="560" />
<rect class="shape" x="240" y="648" width="720" height="62" rx="12" ry="12" />
<text class="text" x="600" y="675" text-anchor="middle"><tspan x="600" dy="0">Contacts list + stats refresh</tspan><tspan x="600" dy="14">(contacts page)</tspan></text>
<line class="shape thin" x1="600" y1="638" x2="600" y2="648" />
<rect class="shape" x="240" y="736" width="720" height="62" rx="12" ry="12" />
<text class="text" x="600" y="763" text-anchor="middle"><tspan x="600" dy="0">Optional: Create AI Draft</tspan><tspan x="600" dy="14">(follow-up email)</tspan></text>
<line class="shape thin" x1="600" y1="726" x2="600" y2="736" />
<circle class="shape" cx="600" cy="834" r="14" />
<circle class="fillBlack" cx="600" cy="834" r="8" />
<line class="shape thin" x1="600" y1="814" x2="600" y2="822" />
<rect class="shape thin" x="60" y="650" width="320" height="110" rx="6" ry="6" />
<text class="text textSmall" x="70" y="668" text-anchor="start"><tspan x="70" dy="0">Multilingual cards:</tspan><tspan x="70" dy="14">- AI prompt asks for</tspan><tspan x="70" dy="14">  native-script fields</tspan><tspan x="70" dy="14">  (name_native, company_native)</tspan><tspan x="70" dy="14">- Store both native + Latin</tspan><tspan x="70" dy="14">  where possible</tspan></text>
</svg>