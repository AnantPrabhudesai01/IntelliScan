<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="840" viewBox="0 0 1400 840">
<defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#000"/>
      </marker>
    </defs>
<style>
      .shape { fill: #fff; stroke: #000; stroke-width: 2; }
      .thin { stroke-width: 1.5; }
      .fillBlack { fill: #000; stroke: #000; stroke-width: 2; }
      .text { fill: #000; font-family: Arial, Helvetica, sans-serif; font-size: 14px; }
      .textSmall { font-size: 12px; }
      .textTitle { font-size: 16px; font-weight: 700; }
      .dashed { stroke-dasharray: 6 6; }
    </style>
<rect x="0" y="0" width="1400" height="840" fill="#fff" />
<text class="text textTitle" x="700" y="40" text-anchor="middle">Class Diagram: Email Marketing (Campaigns + Sends + Tracking)</text>
<rect class="shape" x="70" y="90" width="360" height="164" rx="4" ry="4" />
<line class="shape thin" x1="70" y1="124" x2="430" y2="124" />
<line class="shape thin" x1="70" y1="214" x2="430" y2="214" />
<text class="text textSmall" x="250" y="112" text-anchor="middle">EmailCampaign</text>
<text class="text textSmall" x="80" y="142" text-anchor="start">+id: int</text>
<text class="text textSmall" x="80" y="158" text-anchor="start">+workspace_id: int</text>
<text class="text textSmall" x="80" y="174" text-anchor="start">+subject: string</text>
<text class="text textSmall" x="80" y="190" text-anchor="start">+body: text</text>
<text class="text textSmall" x="80" y="206" text-anchor="start">+status</text>
<text class="text textSmall" x="80" y="232" text-anchor="start">+send()</text>
<rect class="shape" x="520" y="90" width="330" height="118" rx="4" ry="4" />
<line class="shape thin" x1="520" y1="124" x2="850" y2="124" />
<line class="shape thin" x1="520" y1="166" x2="850" y2="166" />
<text class="text textSmall" x="685" y="112" text-anchor="middle">EmailList</text>
<text class="text textSmall" x="530" y="142" text-anchor="start">+id: int</text>
<text class="text textSmall" x="530" y="158" text-anchor="start">+name: string</text>
<text class="text textSmall" x="530" y="184" text-anchor="start">+addContact()</text>
<text class="text textSmall" x="530" y="200" text-anchor="start">+removeContact()</text>
<rect class="shape" x="900" y="90" width="420" height="164" rx="4" ry="4" />
<line class="shape thin" x1="900" y1="124" x2="1320" y2="124" />
<line class="shape thin" x1="900" y1="214" x2="1320" y2="214" />
<text class="text textSmall" x="1110" y="112" text-anchor="middle">EmailSend</text>
<text class="text textSmall" x="910" y="142" text-anchor="start">+id: int</text>
<text class="text textSmall" x="910" y="158" text-anchor="start">+campaign_id: int</text>
<text class="text textSmall" x="910" y="174" text-anchor="start">+recipient: string</text>
<text class="text textSmall" x="910" y="190" text-anchor="start">+status</text>
<text class="text textSmall" x="910" y="206" text-anchor="start">+opened_at?</text>
<text class="text textSmall" x="910" y="232" text-anchor="start">(none)</text>
<rect class="shape" x="70" y="430" width="420" height="132" rx="4" ry="4" />
<line class="shape thin" x1="70" y1="464" x2="490" y2="464" />
<line class="shape thin" x1="70" y1="522" x2="490" y2="522" />
<text class="text textSmall" x="280" y="452" text-anchor="middle">SmtpProvider</text>
<text class="text textSmall" x="80" y="482" text-anchor="start">+host</text>
<text class="text textSmall" x="80" y="498" text-anchor="start">+user</text>
<text class="text textSmall" x="80" y="514" text-anchor="start">+pass</text>
<text class="text textSmall" x="80" y="540" text-anchor="start">+sendMail(to, subject, body)</text>
<rect class="shape" x="560" y="430" width="360" height="116" rx="4" ry="4" />
<line class="shape thin" x1="560" y1="464" x2="920" y2="464" />
<line class="shape thin" x1="560" y1="504" x2="920" y2="504" />
<text class="text textSmall" x="740" y="452" text-anchor="middle">TrackingService</text>
<text class="text textSmall" x="570" y="482" text-anchor="start">(none)</text>
<text class="text textSmall" x="570" y="522" text-anchor="start">+recordOpen()</text>
<text class="text textSmall" x="570" y="538" text-anchor="start">+recordClick()</text>
<rect class="shape" x="980" y="430" width="340" height="132" rx="4" ry="4" />
<line class="shape thin" x1="980" y1="464" x2="1320" y2="464" />
<line class="shape thin" x1="980" y1="504" x2="1320" y2="504" />
<text class="text textSmall" x="1150" y="452" text-anchor="middle">EmailAPI</text>
<text class="text textSmall" x="990" y="482" text-anchor="start">(none)</text>
<text class="text textSmall" x="990" y="522" text-anchor="start">+POST /email/campaigns</text>
<text class="text textSmall" x="990" y="538" text-anchor="start">+POST /email/campaigns/:id/send</text>
<text class="text textSmall" x="990" y="554" text-anchor="start">+POST /email/events</text>
<line class="shape thin" x1="430" y1="150" x2="520" y2="150" marker-end="url(#arrow)" />
<text class="text textSmall" x="475" y="140" text-anchor="middle">targets</text>
<line class="shape thin" x1="850" y1="150" x2="900" y2="150" marker-end="url(#arrow)" />
<text class="text textSmall" x="875" y="140" text-anchor="middle">creates</text>
<line class="shape thin" x1="490" y1="520" x2="560" y2="520" marker-end="url(#arrow)" />
<text class="text textSmall" x="525" y="510" text-anchor="middle">events</text>
</svg>