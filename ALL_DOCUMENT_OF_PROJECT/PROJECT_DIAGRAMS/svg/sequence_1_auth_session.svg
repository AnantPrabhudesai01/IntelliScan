<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="620" viewBox="0 0 1400 620">
<defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#000"/>
      </marker>
    </defs>
<style>
      .shape { fill: #fff; stroke: #000; stroke-width: 2; }
      .thin { stroke-width: 1.5; }
      .fillBlack { fill: #000; stroke: #000; stroke-width: 2; }
      .text { fill: #000; font-family: Arial, Helvetica, sans-serif; font-size: 14px; }
      .textSmall { font-size: 12px; }
      .textTitle { font-size: 16px; font-weight: 700; }
      .dashed { stroke-dasharray: 6 6; }
    </style>
<rect x="0" y="0" width="1400" height="620" fill="#fff" />
<text class="text textTitle" x="700" y="40" text-anchor="middle">Interaction Diagram: Session Restore on App Load</text>
<rect class="shape" x="120" y="80" width="180" height="38" rx="4" ry="4" />
<text class="text textSmall" x="210" y="104" text-anchor="middle"><tspan x="210" dy="0">Browser</tspan></text>
<rect class="shape" x="360" y="80" width="220" height="38" rx="4" ry="4" />
<text class="text textSmall" x="470" y="104" text-anchor="middle"><tspan x="470" dy="0">IntelliScan UI</tspan></text>
<rect class="shape" x="660" y="80" width="180" height="38" rx="4" ry="4" />
<text class="text textSmall" x="750" y="104" text-anchor="middle"><tspan x="750" dy="0">Auth API</tspan></text>
<rect class="shape" x="920" y="80" width="200" height="38" rx="4" ry="4" />
<text class="text textSmall" x="1020" y="104" text-anchor="middle"><tspan x="1020" dy="0">DB (SQLite)</tspan></text>
<rect class="shape" x="1180" y="80" width="200" height="38" rx="4" ry="4" />
<text class="text textSmall" x="1280" y="104" text-anchor="middle"><tspan x="1280" dy="0">RBAC/Quotas</tspan></text>
<line class="shape thin dashed" x1="210" y1="118" x2="210" y2="560" />
<line class="shape thin dashed" x1="470" y1="118" x2="470" y2="560" />
<line class="shape thin dashed" x1="750" y1="118" x2="750" y2="560" />
<line class="shape thin dashed" x1="1020" y1="118" x2="1020" y2="560" />
<line class="shape thin dashed" x1="1280" y1="118" x2="1280" y2="560" />
<line class="shape thin" x1="210" y1="150" x2="470" y2="150" marker-end="url(#arrow)" />
<text class="text textSmall" x="340" y="142" text-anchor="middle">Open /dashboard</text>
<line class="shape thin" x1="470" y1="200" x2="750" y2="200" marker-end="url(#arrow)" />
<text class="text textSmall" x="610" y="192" text-anchor="middle">GET /api/auth/me (token)</text>
<line class="shape thin" x1="750" y1="250" x2="1020" y2="250" marker-end="url(#arrow)" />
<text class="text textSmall" x="885" y="242" text-anchor="middle">SELECT session + user</text>
<line class="shape thin dashed" x1="1020" y1="300" x2="1280" y2="300" marker-end="url(#arrow)" />
<text class="text textSmall" x="1150" y="292" text-anchor="middle">Load role/tier/quotas</text>
<line class="shape thin" x1="750" y1="350" x2="470" y2="350" marker-end="url(#arrow)" />
<text class="text textSmall" x="610" y="342" text-anchor="middle">200 {user, quotas}</text>
<line class="shape thin" x1="470" y1="400" x2="210" y2="400" marker-end="url(#arrow)" />
<text class="text textSmall" x="340" y="392" text-anchor="middle">Render dashboard</text>
</svg>