<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="700" viewBox="0 0 1400 700">
<defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#000"/>
      </marker>
    </defs>
<style>
      .shape { fill: #fff; stroke: #000; stroke-width: 2; }
      .thin { stroke-width: 1.5; }
      .fillBlack { fill: #000; stroke: #000; stroke-width: 2; }
      .text { fill: #000; font-family: Arial, Helvetica, sans-serif; font-size: 14px; }
      .textSmall { font-size: 12px; }
      .textTitle { font-size: 16px; font-weight: 700; }
      .dashed { stroke-dasharray: 6 6; }
    </style>
<rect x="0" y="0" width="1400" height="700" fill="#fff" />
<text class="text textTitle" x="700" y="40" text-anchor="middle">Interaction Diagram: Email Campaign Send + Tracking</text>
<rect class="shape" x="70" y="80" width="150" height="38" rx="4" ry="4" />
<text class="text textSmall" x="145" y="104" text-anchor="middle"><tspan x="145" dy="0">User</tspan></text>
<rect class="shape" x="250" y="80" width="180" height="38" rx="4" ry="4" />
<text class="text textSmall" x="340" y="104" text-anchor="middle"><tspan x="340" dy="0">Email UI</tspan></text>
<rect class="shape" x="470" y="80" width="170" height="38" rx="4" ry="4" />
<text class="text textSmall" x="555" y="104" text-anchor="middle"><tspan x="555" dy="0">Email API</tspan></text>
<rect class="shape" x="680" y="80" width="160" height="38" rx="4" ry="4" />
<text class="text textSmall" x="760" y="104" text-anchor="middle"><tspan x="760" dy="0">Gemini AI</tspan></text>
<rect class="shape" x="880" y="80" width="200" height="38" rx="4" ry="4" />
<text class="text textSmall" x="980" y="104" text-anchor="middle"><tspan x="980" dy="0">SMTP Provider</tspan></text>
<rect class="shape" x="1120" y="80" width="220" height="38" rx="4" ry="4" />
<text class="text textSmall" x="1230" y="104" text-anchor="middle"><tspan x="1230" dy="0">DB / Analytics</tspan></text>
<line class="shape thin dashed" x1="145" y1="118" x2="145" y2="640" />
<line class="shape thin dashed" x1="340" y1="118" x2="340" y2="640" />
<line class="shape thin dashed" x1="555" y1="118" x2="555" y2="640" />
<line class="shape thin dashed" x1="760" y1="118" x2="760" y2="640" />
<line class="shape thin dashed" x1="980" y1="118" x2="980" y2="640" />
<line class="shape thin dashed" x1="1230" y1="118" x2="1230" y2="640" />
<line class="shape thin" x1="145" y1="150" x2="340" y2="150" marker-end="url(#arrow)" />
<text class="text textSmall" x="242.5" y="142" text-anchor="middle">Pick list/segment</text>
<line class="shape thin" x1="340" y1="205" x2="555" y2="205" marker-end="url(#arrow)" />
<text class="text textSmall" x="447.5" y="197" text-anchor="middle">POST /api/email/ai-copy</text>
<line class="shape thin" x1="555" y1="260" x2="760" y2="260" marker-end="url(#arrow)" />
<text class="text textSmall" x="657.5" y="252" text-anchor="middle">Generate subject/body</text>
<line class="shape thin" x1="760" y1="315" x2="555" y2="315" marker-end="url(#arrow)" />
<text class="text textSmall" x="657.5" y="307" text-anchor="middle">Copy draft</text>
<line class="shape thin" x1="555" y1="370" x2="340" y2="370" marker-end="url(#arrow)" />
<text class="text textSmall" x="447.5" y="362" text-anchor="middle">Return draft</text>
<line class="shape thin" x1="145" y1="425" x2="340" y2="425" marker-end="url(#arrow)" />
<text class="text textSmall" x="242.5" y="417" text-anchor="middle">Send campaign</text>
<line class="shape thin" x1="340" y1="480" x2="555" y2="480" marker-end="url(#arrow)" />
<text class="text textSmall" x="447.5" y="472" text-anchor="middle">POST /campaigns/:id/send</text>
<line class="shape thin" x1="555" y1="535" x2="980" y2="535" marker-end="url(#arrow)" />
<text class="text textSmall" x="767.5" y="527" text-anchor="middle">Send emails</text>
<line class="shape thin" x1="980" y1="590" x2="1230" y2="590" marker-end="url(#arrow)" />
<text class="text textSmall" x="1105" y="582" text-anchor="middle">Write send rows</text>
<line class="shape thin dashed" x1="980" y1="675" x2="555" y2="675" marker-end="url(#arrow)" />
<text class="text textSmall" x="767.5" y="667" text-anchor="middle">Delivery/open/click events</text>
<line class="shape thin" x1="555" y1="730" x2="340" y2="730" marker-end="url(#arrow)" />
<text class="text textSmall" x="447.5" y="722" text-anchor="middle">Update metrics</text>
</svg>